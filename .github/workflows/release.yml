name: Release

on:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Linux x64 binaries
        run: npm run build
        env:
          PKG_CACHE_PATH: ${{ github.workspace }}/.pkg-cache

      - name: Package release archive
        run: |
          tar -czf memory-extract-linux-x64.tar.gz -C dist me
          sha256sum memory-extract-linux-x64.tar.gz dist/me > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/me
            memory-extract-linux-x64.tar.gz
            checksums.txt
